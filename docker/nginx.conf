# Serves the static frontend and reverse-proxies the API to the backend
# container, so the whole demo works from one origin (http://localhost:8080)
# without CORS.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API: /api/... -> backend /...   (trailing slash strips the /api prefix)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Convenience pass-throughs for health + interactive docs.
    location = /health        { proxy_pass http://backend:8000/health; }
    location = /openapi.json  { proxy_pass http://backend:8000/openapi.json; }
    location /docs            { proxy_pass http://backend:8000/docs; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
